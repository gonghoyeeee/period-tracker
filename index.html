<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>月经记录</title>
  <style>
    :root{
      --bg:#fffaf9;
      --card:#ffffff;
      --text:#3f3135;
      --muted:#927d83;
      --accent:#e792a7;
      --accent-dark:#d26d89;
      --line:#f1d9df;
      --heart:#f05d88;
      --pred:#8c78c5;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .title{margin:0 0 16px;color:var(--accent-dark)}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    button{border:1px solid var(--accent);background:#fff;color:var(--accent-dark);padding:10px 14px;border-radius:12px;cursor:pointer;font:inherit}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(231,146,167,.12)}
    .hidden{display:none}
    label{display:block;margin:10px 0 6px;color:var(--accent-dark);font-weight:600}
    input[type="date"]{width:100%;padding:11px;border-radius:10px;border:1px solid #e6d0d6;background:#fff;font:inherit;color:inherit}
    .check{display:flex;gap:8px;align-items:center;margin-top:10px}
    .inline-tip{color:var(--muted);font-size:13px;margin-top:8px}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    .calendar-head h2{margin:0;font-size:22px;color:var(--accent-dark)}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
    .dow{font-size:12px;text-align:center;color:var(--muted);padding:4px 0}
    .day{position:relative;min-height:70px;border:1px solid var(--line);border-radius:12px;padding:6px;background:#fff;cursor:pointer}
    .day:hover{border-color:var(--accent)}
    .day.empty{background:#fcf7f8;cursor:default}
    .day.today{outline:2px solid #f1a0b4}
    .dnum{font-size:12px;color:var(--muted);position:absolute;right:7px;top:6px}
    .tag{display:inline-block;margin-top:20px;padding:2px 6px;border-radius:999px;font-size:11px;color:#fff}
    .tag.period{background:#ef7f9a}
    .tag.pred{background:var(--pred)}
    .heart{position:absolute;left:6px;bottom:6px;color:var(--heart);font-size:16px;line-height:1}
    .legend{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin:10px 0 14px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px}
    .stat{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff9fb}
    .stat b{display:block;color:var(--accent-dark);font-size:20px}
    .list{margin:0;padding-left:18px}
    .list li{margin:6px 0}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">月经记录（本地离线）</h1>

    <div class="nav">
      <button class="primary" id="toAdd">新增记录</button>
      <button id="toAll">查看全部记录</button>
    </div>

    <section id="viewAdd" class="card">
      <h2 style="margin-top:0;color:var(--accent-dark)">新增记录</h2>
      <label for="startDate">开始日期</label>
      <input id="startDate" type="date" />

      <div class="check">
        <input id="isEnded" type="checkbox" />
        <label for="isEnded" style="margin:0">本次月经已经结束</label>
      </div>

      <div id="endWrap" class="hidden">
        <label for="endDate">结束日期</label>
        <input id="endDate" type="date" />
      </div>

      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="primary" id="saveRecord">保存记录</button>
      </div>
      <div class="inline-tip">只保存开始/结束日期。结束日期可选：勾选“已经结束”后才需要填写。</div>
    </section>

    <section id="viewAll" class="card hidden" style="margin-top:14px">
      <div class="calendar-head">
        <h2 id="monthTitle">—</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="prevMonth">上个月</button>
          <button id="goToday">今天</button>
          <button id="nextMonth">下个月</button>
        </div>
      </div>

      <div class="calendar-grid" id="dow"></div>
      <div class="calendar-grid" id="calendar"></div>

      <div class="legend">
        <span>粉色：记录中的经期</span>
        <span>紫色：预测经期</span>
        <span>♥：点击日期切换小心心</span>
      </div>

      <div class="stats">
        <div class="stat"><span class="muted">样本周期数</span><b id="cycleCount">0</b></div>
        <div class="stat"><span class="muted">学习后平均周期</span><b id="avgCycle">—</b></div>
        <div class="stat"><span class="muted">学习后平均经期</span><b id="avgPeriod">—</b></div>
        <div class="stat"><span class="muted">下次预测开始</span><b id="nextStart">—</b></div>
      </div>

      <h3 style="margin:0 0 8px;color:var(--accent-dark)">详细记录</h3>
      <ul id="detailList" class="list"></ul>
      <p id="emptyTip" class="muted hidden">还没有记录，请先在“新增记录”中添加。</p>
    </section>
  </div>

<script>
  const KEY = 'period_tracker_v1';
  const HEART_KEY = 'period_tracker_hearts_v1';

  const el = id => document.getElementById(id);
  const fmt = d => d.toISOString().slice(0,10);
  const parse = s => { const d = new Date(s); d.setHours(12,0,0,0); return d; };
  const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  const diffDays = (a, b) => Math.round((parse(b) - parse(a)) / 86400000);
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  function getRecords(){
    return JSON.parse(localStorage.getItem(KEY) || '[]');
  }
  function setRecords(records){
    localStorage.setItem(KEY, JSON.stringify(records));
  }
  function getHearts(){
    return new Set(JSON.parse(localStorage.getItem(HEART_KEY) || '[]'));
  }
  function setHearts(heartSet){
    localStorage.setItem(HEART_KEY, JSON.stringify([...heartSet].sort()));
  }

  function getCompletedRecords(){
    return getRecords()
      .filter(r => r.ended && r.end)
      .sort((a,b) => a.start.localeCompare(b.start));
  }

  // 学习逻辑：
  // 1) 平均周期 = 70% 最近3个周期均值 + 30% 历史总均值（最近规律权重更大）
  // 2) 极值限制到 21~40 天，避免异常值拉偏
  // 3) 平均经期使用已结束记录均值，限制 2~10 天
  function buildLearningModel(){
    const completed = getCompletedRecords();
    const periodLens = completed
      .map(r => diffDays(r.start, r.end) + 1)
      .filter(v => Number.isFinite(v) && v > 0);

    const cycles = [];
    for(let i = 1; i < completed.length; i++){
      cycles.push(diffDays(completed[i - 1].start, completed[i].start));
    }

    const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0) / arr.length) : null;
    const globalAvgCycle = avg(cycles);
    const recentAvgCycle = avg(cycles.slice(-3));

    let learnedCycle = 28;
    if(globalAvgCycle && recentAvgCycle){
      learnedCycle = recentAvgCycle * 0.7 + globalAvgCycle * 0.3;
    }else if(globalAvgCycle){
      learnedCycle = globalAvgCycle;
    }
    learnedCycle = Math.round(clamp(learnedCycle, 21, 40));

    let learnedPeriod = avg(periodLens) || 5;
    learnedPeriod = Math.round(clamp(learnedPeriod, 2, 10));

    return {
      cycleCount: cycles.length,
      learnedCycle,
      learnedPeriod,
      completed
    };
  }

  function getPrediction(){
    const model = buildLearningModel();
    const all = getRecords().sort((a,b)=>a.start.localeCompare(b.start));
    if(!all.length){
      return { nextStart: null, predictedRange: null, model };
    }
    const last = all[all.length - 1];
    const nextStart = addDays(parse(last.start), model.learnedCycle);
    const predEnd = addDays(nextStart, model.learnedPeriod - 1);
    return {
      nextStart,
      predictedRange: { start: fmt(nextStart), end: fmt(predEnd) },
      model
    };
  }

  function renderStatsAndDetail(){
    const records = getRecords().sort((a,b)=>a.start.localeCompare(b.start));
    const prediction = getPrediction();
    const model = prediction.model;

    el('cycleCount').textContent = model.cycleCount;
    el('avgCycle').textContent = model.learnedCycle + ' 天';
    el('avgPeriod').textContent = model.learnedPeriod + ' 天';
    el('nextStart').textContent = prediction.nextStart ? fmt(prediction.nextStart) : '—';

    const list = el('detailList');
    list.innerHTML = '';

    if(!records.length){
      el('emptyTip').classList.remove('hidden');
      return;
    }
    el('emptyTip').classList.add('hidden');

    records.forEach((r, idx) => {
      const li = document.createElement('li');
      const status = r.ended ? `结束：${r.end}` : '进行中（尚未结束）';
      li.textContent = `#${idx + 1} 开始：${r.start}；${status}`;
      list.appendChild(li);
    });

    if(prediction.predictedRange){
      const li = document.createElement('li');
      li.innerHTML = `<b>预测：</b>${prediction.predictedRange.start} ~ ${prediction.predictedRange.end}（会根据后续记录持续学习）`;
      list.appendChild(li);
    }
  }

  function initDow(){
    if(el('dow').dataset.ok) return;
    ['一','二','三','四','五','六','日'].forEach(t => {
      const d = document.createElement('div');
      d.className = 'dow';
      d.textContent = '周' + t;
      el('dow').appendChild(d);
    });
    el('dow').dataset.ok = '1';
  }

  window.__viewDate = new Date();
  function renderCalendar(){
    initDow();
    const cal = el('calendar');
    cal.innerHTML = '';

    const v = new Date(window.__viewDate);
    v.setDate(1); v.setHours(12,0,0,0);
    const y = v.getFullYear();
    const m = v.getMonth();
    el('monthTitle').textContent = `${y}年${m + 1}月`;

    const startGap = (v.getDay() + 6) % 7;
    const days = new Date(y, m + 1, 0).getDate();

    const records = getRecords().sort((a,b)=>a.start.localeCompare(b.start));
    const prediction = getPrediction().predictedRange;
    const hearts = getHearts();
    const todayStr = fmt(new Date());

    for(let i = 0; i < startGap; i++){
      const empty = document.createElement('div');
      empty.className = 'day empty';
      cal.appendChild(empty);
    }

    for(let d = 1; d <= days; d++){
      const date = new Date(y, m, d);
      date.setHours(12,0,0,0);
      const ds = fmt(date);

      const cell = document.createElement('div');
      cell.className = 'day';
      if(ds === todayStr) cell.classList.add('today');

      const num = document.createElement('span');
      num.className = 'dnum';
      num.textContent = d;
      cell.appendChild(num);

      const inRealPeriod = records.some(r => {
        if(!r.ended || !r.end) return ds === r.start;
        return parse(ds) >= parse(r.start) && parse(ds) <= parse(r.end);
      });

      if(inRealPeriod){
        const t = document.createElement('span');
        t.className = 'tag period';
        t.textContent = '经期';
        cell.appendChild(t);
      }

      if(prediction && parse(ds) >= parse(prediction.start) && parse(ds) <= parse(prediction.end)){
        const t = document.createElement('span');
        t.className = 'tag pred';
        t.style.marginLeft = inRealPeriod ? '4px' : '0';
        t.textContent = '预测';
        cell.appendChild(t);
      }

      if(hearts.has(ds)){
        const h = document.createElement('span');
        h.className = 'heart';
        h.textContent = '♥';
        cell.appendChild(h);
      }

      cell.addEventListener('click', () => {
        const nextHearts = getHearts();
        if(nextHearts.has(ds)) nextHearts.delete(ds);
        else nextHearts.add(ds);
        setHearts(nextHearts);
        renderCalendar();
      });

      cal.appendChild(cell);
    }
  }

  function renderAll(){
    renderStatsAndDetail();
    renderCalendar();
  }

  el('isEnded').addEventListener('change', (e) => {
    const checked = e.target.checked;
    el('endWrap').classList.toggle('hidden', !checked);
    if(!checked) el('endDate').value = '';
  });

  el('saveRecord').addEventListener('click', () => {
    const start = el('startDate').value;
    const ended = el('isEnded').checked;
    const end = el('endDate').value;

    if(!start){
      alert('请先填写开始日期');
      return;
    }
    if(ended && !end){
      alert('你勾选了“已经结束”，请填写结束日期');
      return;
    }
    if(ended && parse(end) < parse(start)){
      alert('结束日期不能早于开始日期');
      return;
    }

    const records = getRecords();
    records.push({ start, ended, end: ended ? end : '' });
    records.sort((a,b)=>a.start.localeCompare(b.start));
    setRecords(records);

    el('startDate').value = '';
    el('isEnded').checked = false;
    el('endDate').value = '';
    el('endWrap').classList.add('hidden');

    renderAll();
    showView('all');
  });

  function showView(view){
    const isAdd = view === 'add';
    el('viewAdd').classList.toggle('hidden', !isAdd);
    el('viewAll').classList.toggle('hidden', isAdd);
    el('toAdd').classList.toggle('primary', isAdd);
    el('toAll').classList.toggle('primary', !isAdd);
    if(!isAdd) renderAll();
  }

  el('toAdd').addEventListener('click', () => showView('add'));
  el('toAll').addEventListener('click', () => showView('all'));
  el('prevMonth').addEventListener('click', () => { window.__viewDate.setMonth(window.__viewDate.getMonth() - 1); renderCalendar(); });
  el('nextMonth').addEventListener('click', () => { window.__viewDate.setMonth(window.__viewDate.getMonth() + 1); renderCalendar(); });
  el('goToday').addEventListener('click', () => { window.__viewDate = new Date(); renderCalendar(); });

  renderAll();
</script>
</body>
</html>
